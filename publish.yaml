Edition: 3.0.0
Type: Project
Name: tools-station
Provider:
  - 阿里云
Version: 0.0.1
Description: 基于 Next.js + TailwindCSS 的工具集合站，一键部署到阿里云函数计算
HomePage: https://github.com/daifuyang/tools-station
Tags:
  - Next.js
  - TailwindCSS
  - 函数计算
  - Serverless
Category: Web框架
Service:
  函数计算:
    Authorities:
      - AliyunFCFullAccess
Organization: ""
Effective: Private
Parameters:
  type: object
  additionalProperties: false
  required:
    - region
    - functionName
  properties:
    region:
      type: string
      description: 地域
      default: cn-shanghai
      enum:
        - cn-beijing
        - cn-hangzhou
        - cn-shanghai
        - cn-shenzhen
    functionName:
      type: string
      description: 函数名称
      default: tools-station
    domain:
      type: string
      description: 自定义域名
      default: tool.zerocmf.com